name: collect-and-send

# 정시 발송(평일 09·13·17시 KST)은 cron-job.org가 담당(정확도 위해).
# 여기 schedule은 제거하고, 필요 시 수동 실행만 남김(중복 발송 방지).
on:
  workflow_dispatch: {}     # 수동 실행 전용

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect endpoint
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://macro-monitor-sigma.vercel.app/api/cron/collect"
