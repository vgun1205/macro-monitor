name: collect-and-send

# 평일 09:00·13:00·17:00 KST 발송. 주말/공휴일은 라우트에서 발송 스킵.
# (Vercel Hobby cron은 정시 보장이 안 돼 새벽에 도는 문제로, 3회 모두 GitHub Actions로 통일)
on:
  schedule:
    - cron: "0 0 * * 1-5"   # 09:00 KST (00:00 UTC)
    - cron: "0 4 * * 1-5"   # 13:00 KST (04:00 UTC)
    - cron: "0 8 * * 1-5"   # 17:00 KST (08:00 UTC)
  workflow_dispatch: {}     # 수동 실행(테스트)

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect endpoint
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://macro-monitor-sigma.vercel.app/api/cron/collect"
