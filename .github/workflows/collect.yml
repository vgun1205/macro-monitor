name: collect-and-send

# 평일 13:00·17:00 KST 발송(09:00은 Vercel cron 담당). 주말/공휴일은 라우트에서 발송 스킵.
# Vercel Hobby는 cron 하루 1회 제한이라, 추가 2회를 GitHub Actions로 처리.
on:
  schedule:
    - cron: "0 4 * * 1-5"   # 13:00 KST
    - cron: "0 8 * * 1-5"   # 17:00 KST
  workflow_dispatch: {}     # 수동 실행(테스트)

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect endpoint
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://macro-monitor-sigma.vercel.app/api/cron/collect"
